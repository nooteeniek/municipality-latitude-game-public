<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="市区町村を緯度の高い順に選ぶゲーム" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'none'; img-src 'self' data:; media-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; upgrade-insecure-requests"
    />
    <title>北から選べ！ 市区町村ゲーム</title>
    <link rel="stylesheet" href="./game.css" />
    <script src="./municipalities-data.js"></script>
    <script src="./game.js" defer></script>
  </head>
  <body>
    <header class="game-header">
      <div>
        <p class="eyebrow">LATITUDE CHALLENGE</p>
        <h1>北から選べ！</h1>
        <p class="lead">好きな市区町村を、緯度が高い順（北から南）に選んでください。</p>
      </div>
    </header>

    <main>
      <section class="status-panel">
        <label class="mode-picker">
          <span>モード</span>
          <select id="game-mode">
            <option value="tokyo">東京都だけ</option>
            <option value="osaka">大阪府だけ</option>
            <option value="cities">市だけ</option>
            <option value="honshu">本州だけ</option>
            <option value="all">全部入り</option>
          </select>
        </label>
        <div class="score">
          <span>レベル</span>
          <strong id="level">1</strong>
        </div>
        <div class="round-rule">
          <strong><span id="choice-count">5</span>個</strong>から
          <strong><span id="required-count">2</span>個</strong>を選択
        </div>
        <div class="selection-progress">
          選択済み <strong id="selected-count">0</strong> / <span id="required-total">2</span>
        </div>
        <button id="new-game" class="new-game" type="button">このモードで最初から</button>
      </section>

      <section id="result-panel" class="result-panel" aria-live="polite">
        <div id="judgement" class="judgement">？</div>
        <div>
          <p id="result-message">1つ目の市区町村を選んでください</p>
          <dl id="location-detail" hidden>
            <div><dt>都道府県</dt><dd id="detail-prefecture"></dd></div>
            <div><dt>市区町村</dt><dd id="detail-city"></dd></div>
            <div><dt>緯度</dt><dd id="detail-latitude"></dd></div>
            <div><dt>経度</dt><dd id="detail-longitude"></dd></div>
          </dl>
          <button id="next-level" class="next-level" type="button" hidden>
            次のレベルへ
          </button>
        </div>
      </section>

      <section aria-labelledby="choices-title">
        <div class="choices-heading">
          <h2 id="choices-title">市区町村を選択</h2>
          <p>最北の候補から選ぶ必要はありません</p>
        </div>
        <div id="choices" class="choices"></div>
      </section>

      <section id="failure-result" class="failure-result" hidden aria-live="polite">
        <div>
          <p class="failure-label">RESULT</p>
          <h2>レベル <span id="failure-level"></span></h2>
          <p id="failure-message"></p>
        </div>
        <button id="retry-game" type="button">最初から挑戦</button>
      </section>
    </main>

    <footer class="game-footer">
      <p>
        出典：<a href="https://nlftp.mlit.go.jp/isj/" target="_blank" rel="noreferrer">「位置参照情報ダウンロードサービス」（国土交通省）</a>を加工して作成
      </p>
      <p>代表座標は町域座標の平均値であり、庁舎所在地ではありません。</p>
    </footer>

    <div id="game-over-overlay" class="clear-overlay" hidden>
      <div class="clear-card">
        <p class="clear-mark">RESULT</p>
        <h2>レベル <span id="result-level"></span></h2>
        <p id="game-over-message"></p>
        <button id="play-again" type="button">最初から挑戦</button>
      </div>
    </div>
  </body>
</html>
